<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mapa PWA - Mis Lugares</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="data/manifest.json">
    <meta name="theme-color" content="#2196f3">
</head>
<body>
    <div class="container">
        <header>
            <h1>📍 Mis Lugares Cercanos</h1>
            <div class="controls">
                <button id="toggleMarkersBtn">👁️ Ocultar puntos</button>
                <button id="refreshLocationBtn">🔄 Actualizar ubicación</button>
            </div>
            <div id="info">
                <span id="statusMsg">🚀 Cargando mapa...</span>
            </div>
        </header>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
